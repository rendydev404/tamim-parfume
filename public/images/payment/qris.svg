<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <g fill="#000">
    <!-- Q letter with QR code finder pattern -->
    <!-- Outer frame of Q -->
    <rect x="10" y="20" width="120" height="120" />
    <rect x="22" y="32" width="96" height="96" fill="#fff"/>
    <!-- Inner square of Q (QR finder pattern) -->
    <rect x="42" y="52" width="56" height="56"/>
    <rect x="52" y="62" width="36" height="36" fill="#fff"/>
    <rect x="62" y="72" width="16" height="16"/>
    <!-- Q tail / descender extending right-bottom -->
    <rect x="90" y="100" width="40" height="28"/>
    <rect x="110" y="80" width="20" height="20"/>
    
    <!-- Semicolon / dot between Q and R -->
    <rect x="140" y="52" width="16" height="16"/>
    <rect x="140" y="86" width="16" height="50"/>

    <!-- R letter -->
    <rect x="168" y="20" width="20" height="120"/>
    <!-- R top horizontal -->
    <rect x="168" y="20" width="80" height="20"/>
    <!-- R middle horizontal -->
    <rect x="168" y="68" width="80" height="20"/>
    <!-- R right vertical (top half) -->
    <rect x="228" y="20" width="20" height="68"/>
    <!-- R diagonal leg -->
    <polygon points="198,88 218,88 258,140 238,140"/>
    
    <!-- I letter -->
    <rect x="270" y="20" width="20" height="120"/>
    
    <!-- S letter -->
    <rect x="306" y="20" width="90" height="20"/>
    <rect x="306" y="20" width="20" height="68"/>
    <rect x="306" y="68" width="90" height="20"/>
    <rect x="376" y="68" width="20" height="72"/>
    <rect x="306" y="120" width="90" height="20"/>
    
    <!-- Corner bracket top-right (QR code element on S) -->
    <rect x="390" y="0" width="44" height="8"/>
    <rect x="426" y="0" width="8" height="44"/>
  </g>
</svg>
